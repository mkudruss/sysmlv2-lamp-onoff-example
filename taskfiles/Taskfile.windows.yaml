version: "3"

tasks:
  sha-dir:
    desc: Create SHA256 manifest for a view directory
    internal: true
    platforms: [windows]
    cmds:
      - cmd: |
          powershell -NoProfile -ExecutionPolicy Bypass -Command '& {
            $ErrorActionPreference = "Stop"

            function Get-RelativePath {
              param(
                [string]$BasePath,
                [string]$TargetPath
              )

              $baseUri = New-Object System.Uri(($BasePath.TrimEnd("\") + "\"))
              $targetUri = New-Object System.Uri($TargetPath)
              return $baseUri.MakeRelativeUri($targetUri).ToString()
            }

            $dir = "{{.HASH_INPUT_DIR}}"
            $shaFile = "{{.SHA_FILE}}"

            if (-not (Test-Path $dir)) {
              throw ("Directory not found: " + $dir)
            }

            $dirPath = (Resolve-Path $dir).Path
            $manifestPath = Join-Path $dirPath $shaFile

            $files = Get-ChildItem $dirPath -File -Recurse |
              Where-Object { $_.Name -ne $shaFile } |
              Sort-Object FullName

            $lines = @()
            $lines += "# SHA256 manifest"
            $lines += ("# source_dir: " + $dir)
            $lines += ("# file_count: " + $files.Count)
            $lines += "# format: sha256 | bytes | last_write_utc | relative_path"
            $lines += ""

            foreach ($file in $files) {
              $relative = Get-RelativePath -BasePath $dirPath -TargetPath $file.FullName
              $hash = (Get-FileHash $file.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
              $bytes = $file.Length
              $lastWriteUtc = $file.LastWriteTimeUtc.ToString("yyyy-MM-ddTHH:mm:ssZ")
              $lines += ($hash + " | " + $bytes + " | " + $lastWriteUtc + " | " + $relative)
            }

            Set-Content -Path $manifestPath -Value $lines -Encoding UTF8
          }'

  verify-static:
    desc: Compare generated views against static reference views without regenerating
    internal: true
    platforms: [windows]
    cmds:
      - task: sha-dir
        vars:
          HASH_INPUT_DIR: "{{.VIEWS_DIR}}"
      - task: sha-dir
        vars:
          HASH_INPUT_DIR: "{{.STATIC_VIEWS_DIR}}"
      - cmd: |
          powershell -NoProfile -ExecutionPolicy Bypass -Command '& {
            $ErrorActionPreference = "Stop"

            function Read-Manifest {
              param([string]$Path)

              $rows = @{}

              Get-Content $Path |
                Where-Object { $_ -and -not $_.StartsWith("#") } |
                ForEach-Object {
                  $parts = $_ -split "\s+\|\s+", 4

                  if ($parts.Count -ne 4) {
                    throw ("Invalid manifest row in " + $Path + ": " + $_)
                  }

                  $rows[$parts[3]] = [PSCustomObject]@{
                    Sha256 = $parts[0]
                    Bytes = [Int64]$parts[1]
                    LastWriteUtc = [DateTime]::Parse($parts[2]).ToUniversalTime()
                    Path = $parts[3]
                  }
                }

              return $rows
            }

            $generatedManifest = Join-Path "{{.VIEWS_DIR}}" "{{.SHA_FILE}}"
            $staticManifest = Join-Path "{{.STATIC_VIEWS_DIR}}" "{{.SHA_FILE}}"

            $generated = Read-Manifest -Path $generatedManifest
            $static = Read-Manifest -Path $staticManifest

            $allPaths = @($generated.Keys + $static.Keys) | Sort-Object -Unique

            $missingGenerated = @()
            $missingStatic = @()
            $contentMismatch = @()
            $metadataMismatch = @()

            foreach ($path in $allPaths) {
              $hasGenerated = $generated.ContainsKey($path)
              $hasStatic = $static.ContainsKey($path)

              if (-not $hasGenerated) {
                $missingGenerated += $path
                continue
              }

              if (-not $hasStatic) {
                $missingStatic += $path
                continue
              }

              $g = $generated[$path]
              $s = $static[$path]

              if ($g.Sha256 -ne $s.Sha256) {
                $relation = "same timestamp"

                if ($g.LastWriteUtc -gt $s.LastWriteUtc) {
                  $relation = "generated newer than static"
                } elseif ($g.LastWriteUtc -lt $s.LastWriteUtc) {
                  $relation = "static newer than generated"
                }

                $contentMismatch += [PSCustomObject]@{
                  Path = $path
                  StaticSha256 = $s.Sha256
                  GeneratedSha256 = $g.Sha256
                  StaticBytes = $s.Bytes
                  GeneratedBytes = $g.Bytes
                  StaticLastWriteUtc = $s.LastWriteUtc.ToString("yyyy-MM-ddTHH:mm:ssZ")
                  GeneratedLastWriteUtc = $g.LastWriteUtc.ToString("yyyy-MM-ddTHH:mm:ssZ")
                  TimestampRelation = $relation
                }
              } elseif ($g.Bytes -ne $s.Bytes) {
                $metadataMismatch += [PSCustomObject]@{
                  Path = $path
                  Reason = "Same SHA256 but different byte count; this should not normally happen."
                  StaticBytes = $s.Bytes
                  GeneratedBytes = $g.Bytes
                }
              }
            }

            $hasFailure = $false

            Write-Host "Static reference manifest:"
            Write-Host ("  " + $staticManifest)
            Write-Host ""
            Write-Host "Generated view manifest:"
            Write-Host ("  " + $generatedManifest)
            Write-Host ""

            if ($missingGenerated.Count -gt 0) {
              $hasFailure = $true
              Write-Host "Files present in static reference views but missing from generated views:"
              $missingGenerated | ForEach-Object { Write-Host ("  " + $_) }
              Write-Host ""
            }

            if ($missingStatic.Count -gt 0) {
              $hasFailure = $true
              Write-Host "Files present in generated views but missing from static reference views:"
              $missingStatic | ForEach-Object { Write-Host ("  " + $_) }
              Write-Host ""
            }

            if ($contentMismatch.Count -gt 0) {
              $hasFailure = $true
              Write-Host "Files with content mismatch:"
              $contentMismatch | Format-Table -AutoSize
              Write-Host ""
            }

            if ($metadataMismatch.Count -gt 0) {
              $hasFailure = $true
              Write-Host "Files with metadata inconsistency:"
              $metadataMismatch | Format-Table -AutoSize
              Write-Host ""
            }

            if ($hasFailure) {
              Write-Host "Result: generated views are NOT content-wise identical to static reference views."
              Write-Host "Policy: static/views is the authoritative baseline unless deliberately refreshed."
              exit 1
            }

            Write-Host "Result: generated views are content-wise identical to static reference views."
          }'
